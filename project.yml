name: Lumo
options:
  bundleIdPrefix: com.lumo.rentals
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

# Build-time configuration. `Lumo.xcconfig` is committed and `#include?`s
# the gitignored `Lumo.local.xcconfig` written by
# `scripts/ios-write-xcconfig.sh` from env. CI / fresh clones build with
# empty values; the app surfaces a clean "auth not configured" state
# rather than crashing.
configFiles:
  Debug: Lumo.xcconfig
  Release: Lumo.xcconfig

# Pinned remote SwiftPM dependencies. Supabase Swift SDK provides
# `Supabase` (high-level client) and `Auth` (session storage protocol +
# Apple Sign-In id-token exchange). 2.x is the current major; we pin
# loosely to allow patch + minor updates but block 3.x without review.
#
# Stripe iOS SDK 24.x is the current major; same pinning shape (allow
# patch + minor, block 25.x). The SPM-only mirror at stripe-ios-spm
# avoids checking out the full stripe-ios examples + tests (faster
# resolution, smaller checkout). Products used:
#   - StripePaymentSheet — drop-in PaymentSheet (card add + Apple Pay).
#   - StripeApplePay — standalone Apple Pay button (queued for v1.1).
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  StripePaymentSheet:
    url: https://github.com/stripe/stripe-ios-spm
    from: "24.0.0"
  # Daily WebRTC iOS SDK — streaming voice path (ORCHET-IOS-PARITY-1).
  # Supplies CallClient, audio capture, app-message channel. Gated at
  # runtime behind OrchetVoiceMode=streaming; default-batch builds do
  # not exercise this dep.
  Daily:
    url: https://github.com/daily-co/daily-client-ios
    from: "0.27.0"
  # GoogleSignIn iOS SDK — native Google sign-in that returns an
  # id_token directly. Bypasses the Supabase OAuth web redirect
  # (which was leaking the auth code to www.orchet.ai instead of
  # the lumo:// scheme and producing the "both auth code and code
  # verifier should be non-empty" 400 on /token). We hand the
  # id_token + nonce to Supabase via `signInWithIdToken`, same
  # pattern as Apple Sign-In.
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Lumo:
    type: application
    platform: iOS
    sources:
      - path: Lumo
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Supabase
        product: Auth
      - package: StripePaymentSheet
        product: StripePaymentSheet
      - package: StripePaymentSheet
        product: StripeApplePay
      - package: Daily
        product: Daily
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_NAME: Lumo
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Lumo/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lumo/Lumo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SDKROOT: iphoneos
        # Surface xcconfig values to Info.plist so the running app can
        # read them at launch (see Lumo/Resources/Info.plist). URL is
        # split scheme/host because xcconfig truncates at `//`.
        INFOPLIST_KEY_LumoSupabaseURLScheme: $(LUMO_SUPABASE_URL_SCHEME)
        INFOPLIST_KEY_LumoSupabaseURLHost: $(LUMO_SUPABASE_URL_HOST)
        INFOPLIST_KEY_LumoSupabaseAnonKey: $(LUMO_SUPABASE_ANON_KEY)
        INFOPLIST_KEY_LumoStripePublishableKey: $(LUMO_STRIPE_PUBLISHABLE_KEY_TEST)
        INFOPLIST_KEY_LumoStripeMerchantID: $(LUMO_STRIPE_MERCHANT_ID)
        INFOPLIST_KEY_LumoAPNsUseSandbox: $(LUMO_APNS_USE_SANDBOX)
        # Streaming voice (ORCHET-IOS-PARITY-1). Mode is `batch`
        # (legacy push-to-talk) or `streaming` (Daily WebRTC). Base
        # points at the orchet-voice Fly service. Per-engineer
        # overrides live in Lumo.local.xcconfig.
        INFOPLIST_KEY_OrchetVoiceMode: $(ORCHET_VOICE_MODE)
        INFOPLIST_KEY_OrchetVoiceBase: $(ORCHET_VOICE_BASE)
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios.dev
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios
          SWIFT_OPTIMIZATION_LEVEL: -O

  LumoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumoTests
    dependencies:
      - target: Lumo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios.tests
        GENERATE_INFOPLIST_FILE: YES

  # Phase 3 MVP — watchOS companion (single-target watch app, watchOS 7+
  # shape; no embedded WatchKit extension). Display-only today: no
  # backend calls, no OAuth, no payments, no keychain access. The iPhone
  # app does NOT embed this app today (real-device pairing requires
  # provisioning + Developer Portal coordination — out of scope for the
  # initial MVP). Simulator-only build target.
  #
  # Naming: this is a NEW target carrying the post-rebrand "Orchet"
  # branding. The existing iOS app target stays "Lumo" pending the
  # App-Store rebrand coordination. The bundle ID still uses the
  # `com.lumo.rentals.ios.*` prefix so the watch can pair with the
  # existing iOS app on real devices (the WKCompanionAppBundleIdentifier
  # in OrchetWatch/Info.plist points back at com.lumo.rentals.ios).
  #
  # Bundle IDs (preserve the bundle-identity invariant; only the target
  # name + display name flip to Orchet):
  #   Release: com.lumo.rentals.ios.watchkitapp
  #   Debug:   com.lumo.rentals.ios.dev.watchkitapp
  OrchetWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: OrchetWatch
    settings:
      base:
        PRODUCT_NAME: OrchetWatch
        TARGETED_DEVICE_FAMILY: "4"
        INFOPLIST_FILE: OrchetWatch/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SUPPORTED_PLATFORMS: "watchsimulator watchos"
        SDKROOT: watchos
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios.dev.watchkitapp
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios.watchkitapp
          SWIFT_OPTIMIZATION_LEVEL: -O

# Explicit shared scheme so xcodebuild on a fresh checkout (or after a
# `rm -rf Lumo.xcodeproj`) finds a destination. xcodegen 2.45 does not
# generate a shared scheme by default for this target shape; without
# one xcodebuild's destination resolution fails with "Supported
# platforms for the buildables in the current scheme is empty".
schemes:
  Lumo:
    build:
      targets:
        Lumo: all
        LumoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LumoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  # Phase 3 MVP — explicit shared scheme for the watchOS target so
  # `xcodebuild -scheme OrchetWatch -destination 'platform=watchOS
  # Simulator,...'` works on a fresh checkout without manual scheme
  # generation. Same shape as the Lumo scheme above; no test target on
  # the watch yet (display-only MVP).
  OrchetWatch:
    build:
      targets:
        OrchetWatch: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

